<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác thực email</title>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f5f5f5;">
  <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border: 1px solid #ddd;">
    <h2 style="margin: 0 0 20px 0; font-size: 20px; color: #333;">Xác thực địa chỉ email</h2>

    <p style="margin: 0 0 15px 0; color: #333;">Xin chào <strong>{{username}}</strong>,</p>

    <p style="margin: 0 0 20px 0; color: #666; line-height: 1.5;">
      Vui lòng xác thực địa chỉ email của bạn bằng cách nhấn vào nút bên dưới:
    </p>

    <p style="margin: 25px 0;">
      <a href="{{verificationLink}}" style="display: inline-block; padding: 10px 16px; background-color: #333; color: #fff; text-decoration: none; border-radius: 3px;">Xác thực email</a>
    </p>

    <p style="margin: 20px 0 0 0; color: #999; font-size: 13px; line-height: 1.5;">
      Hoặc copy link sau vào trình duyệt:<br>
      <span style="color: #666; word-break: break-all;">{{verificationLink}}</span>
    </p>

    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 13px; color: #999;">
      <p style="margin: 5px 0;">Email từ Your Shop</p>
    </div>
  </div>
</body>
</html>
