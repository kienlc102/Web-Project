<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cập nhật đơn hàng</title>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f5f5f5;">
  <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border: 1px solid #ddd;">
    <h2 style="margin: 0 0 20px 0; font-size: 20px; color: #333;">Cập nhật đơn hàng</h2>

    <p style="margin: 0 0 15px 0; color: #333;">Xin chào <strong>{{customerName}}</strong>,</p>

    <div style="background-color: #f8f8f8; padding: 15px; border: 1px solid #eee; margin: 20px 0;">
      <p style="margin: 5px 0; color: #333;"><strong>Mã đơn hàng:</strong> #{{orderId}}</p>
      <p style="margin: 5px 0; color: #333;"><strong>Trạng thái:</strong> {{status}}</p>
    </div>

    <p style="margin: 0 0 20px 0; color: #666; line-height: 1.5;">
      {{statusMessage}}
    </p>

    {{#if trackingCode}}
    <div style="background-color: #f8f8f8; padding: 15px; border: 1px solid #eee; margin: 20px 0;">
      <p style="margin: 5px 0; color: #333;"><strong>Đơn vị vận chuyển:</strong> {{carrier}}</p>
      <p style="margin: 5px 0; color: #333;"><strong>Mã vận đơn:</strong> <span style="font-family: monospace;">{{trackingCode}}</span></p>
    </div>
    {{/if}}

    <p style="margin: 25px 0;">
      <a href="{{trackingUrl}}" style="display: inline-block; padding: 10px 16px; background-color: #333; color: #fff; text-decoration: none; border-radius: 3px;">Xem chi tiết</a>
    </p>

    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 13px; color: #999;">
      <p style="margin: 5px 0;">Email từ Your Shop</p>
    </div>
  </div>
</body>
</html>
